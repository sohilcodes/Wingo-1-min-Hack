<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinGo Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0b1220;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding-top:30px;
}

.period{
font-size:20px;
margin-bottom:20px;
}

.pred{
font-size:60px;
font-weight:bold;
}

.big{color:#22c55e}
.small{color:#ef4444}

.bluebox{
background:linear-gradient(90deg,#0ea5e9,#2563eb);
width:240px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px #000;
}

.timer{
font-size:48px;
font-weight:bold;
}

.status{
font-size:26px;
margin-top:10px;
}

.win{color:#00ff95}
.loss{color:#ff4d4d}

.history{
margin-top:30px;
height:150px;
overflow:hidden;
border-top:1px solid #222;
padding-top:10px;
}

.row{
padding:6px;
}

.celebrate{
animation:pop 0.5s 6;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="period" id="period">Loading...</div>

<div id="prediction" class="pred">BIG</div>

<div class="bluebox">
<div id="timer" class="timer">--</div>
</div>

<div id="status" class="status"></div>

<div class="history" id="historyBox"></div>

<script>

let lastIssue=""
let prediction = rand()

function rand(){
return Math.random()>0.5 ? "BIG":"SMALL"
}

function size(n){
return n>=5 ? "BIG":"SMALL"
}

function color(s){
return s=="BIG"?"big":"small"
}

// DM Period
function dmPeriod(){

let d = new Date()

let yyyy=d.getFullYear()
let mm=String(d.getMonth()+1).padStart(2,'0')
let dd=String(d.getDate()).padStart(2,'0')

let totalMin=Math.floor(d.getTime()/60000)
let round=String(totalMin%1000).padStart(3,'0')

return `${yyyy}${mm}${dd}10001${round}`
}

// REAL TIMER
setInterval(()=>{

let sec = new Date().getSeconds()
let left = 60-sec

document.getElementById("timer").innerText = left

if(sec==0){

prediction = rand()
document.getElementById("prediction").innerText = prediction

load()

}

},1000)

function load(){

fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts="+Date.now())
.then(r=>r.json())
.then(d=>{

let cur = d.data.list[0]
let prev = d.data.list[1]

let curSize = size(parseInt(cur.number))
let prevSize = size(parseInt(prev.number))

document.getElementById("period").innerText = dmPeriod()

// WIN LOSS
if(lastIssue != cur.issueNumber){

let status = document.getElementById("status")

if(curSize == prediction){

status.innerHTML = "🎉 WIN"
status.className="status win celebrate"

}else{

status.innerHTML = "😢 LOSS"
status.className="status loss"

}

addHistory(cur.issueNumber,curSize)

lastIssue = cur.issueNumber

}

})

}

function addHistory(issue,res){

let box = document.getElementById("historyBox")

let div = document.createElement("div")
div.className="row "+color(res)

div.innerHTML = issue+" → "+res

box.prepend(div)

// auto scroll feel
box.scrollTop = 0

}

document.getElementById("prediction").innerText = prediction

load()

</script>

</body>
</html>
